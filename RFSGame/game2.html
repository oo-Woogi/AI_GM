<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가위바위보 게임</title>
    <style>
        /* 기본 스타일 초기화 및 레이아웃 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        /* 시작 버튼 스타일 */
        .btn-start {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 20px;
            width: 100%;
        }

        .btn-start:hover {
            background-color: #4338ca;
        }

        /* 웹캠 및 결과 영역 반응형 스타일 */
        .game-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        #webcam-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            background-color: #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 티처블머신이 생성하는 canvas를 반응형으로 조절 */
        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* 결과 표시 영역 스타일 */
        #result-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        /* 결과 이미지 컨테이너 스타일 */
        #result-image-container {
            width: 100px; /* 이미지 크기 조절 */
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #result-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* 현재 상태 결과 텍스트 스타일 */
        #result-text {
            font-size: 2rem;
            font-weight: 800;
            color: #1e1b4b;
            padding: 15px 30px;
            background-color: #e0e7ff;
            border-radius: 8px;
            min-width: 200px;
            box-sizing: border-box;
        }

        /* 태블릿 및 데스크톱 화면을 위한 미디어 쿼리 */
        @media (min-width: 768px) {
            .btn-start {
                width: auto;
            }
            h1 {
                font-size: 2.2rem;
            }
            #result-area {
                flex-direction: row; /* 이미지와 텍스트를 가로로 배치 */
                justify-content: center;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>가위바위보 게임</h1>
    <button type="button" class="btn-start" onclick="init()">게임 시작 (Start)</button>
    
    <div class="game-box">
        <div id="webcam-container"></div>
        <div id="result-area">
            <div id="result-image-container"></div>
            <div id="result-text">대기 중...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/mXn8LcmcQ/";

    let model, webcam, resultImageContainer, resultText, maxPredictions;

    // 이미지 매핑 데이터 (사용자 환경에 맞게 이미지 경로 수정 필요)
    const resultImages = {
        "가위": "free-icon-scissors-4151780.png", // 가위 이미지 경로
        "바위": "free-icon-fist-8568638.png", // 바위 이미지 경로
        "보": "free-icon-hand-paper-12355903.png",   // 보 이미지 경로
        // "아무것도 내지 않음" 상태는 이미지를 표시하지 않음
    };

    async function init() {
        // 버튼이 여러번 눌리는 것을 방지하기 위해 시작 후 비활성화 처리
        document.querySelector('.btn-start').style.display = 'none';
        
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true; 
        // CSS에서 크기를 제어하므로 초기 해상도는 기본값 유지
        webcam = new tmImage.Webcam(400, 400, flip); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        resultImageContainer = document.getElementById("result-image-container");
        resultText = document.getElementById("result-text");
        resultText.innerHTML = "인식 시작됨";
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        let highestClassName = "";
        let highestProbability = 0;

        // 가장 높은 확률을 가진 카테고리 찾기
        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].probability > highestProbability) {
                highestProbability = prediction[i].probability;
                highestClassName = prediction[i].className;
            }
        }

        // 결과 업데이트 (이미지와 텍스트)
        if (highestClassName) {
            resultText.innerHTML = highestClassName; // 텍스트 업데이트

            // 이미지 업데이트
            if (resultImages[highestClassName]) {
                resultImageContainer.innerHTML = `<img src="${resultImages[highestClassName]}" alt="${highestClassName}">`;
            } else {
                // "아무것도 내지 않음"이거나 매핑된 이미지가 없는 경우 이미지를 지움
                resultImageContainer.innerHTML = "";
            }
        }
    }
</script>

</body>
</html>
